<style>
#mockupContainer {
	background: #333333;
	border: 1px solid #555555;
	padding: 0px !important;
	margin: 0px;
	width: calc(100vw - 100px) !important;
	height: calc(100vh - 175px) !important;
	overflow: scroll;
	display: flex;
	text-align: left;
}
#canvasWrap {
	margin: 0px;
	padding: 0px;
	flex: 1 1 100%;
	position: relative;
	background-color: #333333;
}
</style>
<div id="mockupContainer">
	<div id="widgetsArea"></div>
	<div id="canvasWrap">
		<div id="canvas">
			<!-- Js.QuickMockup:Content -->
			<!-- Js.QuickMockup:#END -->
		</div>
	</div>
</div>
<script>
	var mockupDataObj = [####JSON-DATA|json####];
	qMockupEditor.setupEditor('widgetsArea', 350);
	qMockupEditor.loadDocumentData(mockupDataObj);
	mockupDataObj = null; // clear
	qMockupEditor.setupElements();
</script>
<script>
	SmartJS_BrowserUtils.PageAwayControl('Exit without Save ?');
</script>
<script>
function doSaveMockup() {
	var data = qMockupEditor.getCanvasData();
//	data.docTitle = String($('#mockup_title').val());
	data = JSON.stringify(data);
	$('#mockup_data').val(data);
	SmartJS_BrowserUtils.RefreshParent();
	SmartJS_BrowserUtils.Submit_Form_By_Ajax('mockup_form', 'admin.php?page=agile.mockup-save', 'yes');
}
</script>
