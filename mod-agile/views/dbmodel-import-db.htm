<!-- dbmodel-import-db.htm v.20200121 -->
[###HTML-JS-HIGHLIGHT###]
<h1 style="display:inline-box;">Import DB-Model from a DB Connection</h1>
<style>
	label {
		display: inline-block !important;
		min-width: 125px !important;
	}
</style>
<table width="99%"><tr valign="top">
<td width="49%">
	<form class="ux-form" name="db_import_fromdb" id="db_import_fromdb" method="post" action="#" autocomplete="off">
		<legend><h3 style="display:inline-box;">SQLite / PostgreSQL / MySQL</h3></legend><br>
		<div class="ux-control-group">
			<label>DB Type:</label>
			<select name="frm[type]" class="ux-input-1-1">
				<option value="">--- Select DB Type ---</option>
				<option value="sqlite">SQLite DB File</option>
				<option value="postgresql">PostgreSQL DB Server</option>
				<option value="mysql">MySQL / MariaDB DB Server</option>
			</select>
		</div>
		<div class="ux-control-group">
			<label>Database:</label>
			<input name="frm[db]" class="ux-input-1-1" type="text" value="" placeholder="DB File (for SQLite) / DB Name (for PostgreSQL or MySQL)" autocomplete="off">
		</div>
		<legend></legend><br>
		<div class="ux-control-group">
			<label>DB&nbsp;Schema:</label>
			<input name="frm[schema]" class="ux-input-1-1" type="text" value="" placeholder="Database Schema (*Optional* ; for PostgreSQL only)" autocomplete="off">
		</div>
		<div class="ux-control-group">
			<label>Server&nbsp;Host:</label>
			<input name="frm[host]" class="ux-input-1-1" type="text" value="" placeholder="Server Hostname or Server IP Address (PostgreSQL / MySQL)" autocomplete="off">
		</div>
		<div class="ux-control-group">
			<label>Server&nbsp;Port:</label>
			<input name="frm[port]" class="ux-input-1-1" type="text" value="" placeholder="Server Port: 5432 for PostgreSQL or 3306 for MySQL" autocomplete="off">
		</div>
		<div class="ux-control-group">
			<label>User:</label>
			<input name="frm[user]" class="ux-input-1-1" type="text" value="" placeholder="Server Auth UserName (PostgreSQL / MySQL)" autocomplete="off">
		</div>
		<div class="ux-control-group">
			<label>Password:</label>
			<input name="frm[pass]" class="ux-input-1-1" type="password" value="" placeholder="Server Auth Password (PostgreSQL / MySQL)" autocomplete="off">
		</div>
		<legend></legend><br>
		<div class="ux-controls">
			<button type="button" class="ux-button ux-button-small ux-button-special" style="margin-right:10px; margin-bottom:5px;" onClick="SmartJS_BrowserUtils.CloseDelayedModalPopUp();"> Cancel Import &nbsp; <i class="sfi sfi-cancel-circle"></i></button>
			<button type="button" class="ux-button ux-button-small ux-button-primary" style="margin-right:10px; margin-bottom:5px;" onClick="jQuery('#dbmodel_data').val(''); jQuery('#btn-done').prop('disabled',true).hide(); jQuery('#the-xml').empty().html(''); SmartJS_BrowserUtils.Submit_Form_By_Ajax('db_import_fromdb', 'admin.php?page=agile.dbmodel-import-db&mode=import', 'yes'); return false;"> Import Model from DB Connection &nbsp; <i class="sfi sfi-cloud-check"></i></button>
		</div>
	</form>
</td>
<td width="2%">
	&nbsp;
</td>
<td width="49%">
	<div style="border: 1px solid #ECECEC; margin:0px; padding:0px; width:100%; height:80vh;"><pre style="background:#FCFCFC; width:100%; height:100%; margin:0px; padding:0px;"><code id="the-xml" class="xml" style="width:100%; height:100%; margin:0px; padding:0px; overflow:auto;"></code></pre></div>
	<div id="second-form-area" style="margin-top:5px;">
		<form class="ux-form" name="db_import_done" id="db_import_done" method="post" action="admin.php?/page/agile.dbmodel-editor/edit/yes/import/done" autocomplete="off">
			<input type="hidden" name="dbmodel_data" value="" id="dbmodel_data">
			<button type="submit" class="ux-button ux-button-small ux-button-regular" style="margin-right:10px; margin-bottom:5px;" id="btn-done">Create from Import</button>
		</form>
	</div>
</td>
</tr></table>
<script>
jQuery('#btn-done').prop('disabled',true).hide();
</script>
