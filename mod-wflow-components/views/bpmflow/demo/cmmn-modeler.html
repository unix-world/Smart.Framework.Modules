<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8" />
		<title>CMMN Modeler</title>

		<link rel="stylesheet" type="text/css" href="../../../../../lib/core/plugins/fonts/typo/sans/ibm-plex-sans.css">
		<style type="text/css">
		* {
			font-family: 'IBM Plex Sans',arial,sans-serif;
		}
		</style>
		<script type="text/javascript" src="../../../../../lib/js/jquery/jquery.js"></script>

		<!-- required modeler styles -->
		<link rel="stylesheet" href="../modeler.css">
		<link rel="stylesheet" href="../cmmn-font.css">

		<!-- modeler distro -->
		<script src="../cmmn-modeler.js"></script>

		<!-- example styles -->
		<style>
			html, body, #canvas {
				height: 100%;
				padding: 0;
				margin: 0;
			}

			.diagram-note {
				background-color: rgba(66, 180, 21, 0.7);
				color: White;
				border-radius: 5px;
				font-family: Arial;
				font-size: 12px;
				padding: 5px;
				min-height: 16px;
				width: 65px;
				text-align: center;
			}

			.needs-discussion:not(.djs-connection) .djs-visual > :nth-child(1) {
				stroke: rgba(66, 180, 21, 0.7) !important; /* color elements as red */
			}

			#save-button {
				position: fixed;
				top: 20px;
				right: 20px;
			}
			#undo-button {
				position: fixed;
				top: 50px;
				right: 75px;
			}
			#redo-button {
				position: fixed;
				top: 50px;
				right: 20px;
			}
		</style>
	</head>
	<body>
		<div style="position:fixed; top:0px; left:0px; width:99%; text-align:center;">
			<h1 style="display:inline;">CMMN Modeler (Editor)</h1>
		</div>
		<div id="canvas"></div>

		<button id="save-button">print to console</button>
		<button id="undo-button">undo</button>
		<button id="redo-button">redo</button>

		<script>

			var diagramUrl = 'data/diagram.cmmn';

			// modeler instance
			var cmmnModeler = new CmmnJS({
				container: '#canvas',
				keyboard: {
					bindTo: window
				}
			});

			/**
			 * Save diagram contents and print them to the console.
			 */
			function exportDiagram() {

				cmmnModeler.saveXML({ format: true }, function(err, xml) {

					if (err) {
						return console.error('could not save CMMN 2.0 diagram', err);
					}

					alert('Diagram exported. Check the developer tools!');

					console.log('DIAGRAM', xml);
				});
			}

			/**
			 * Open diagram in our modeler instance.
			 *
			 * @param {String} cmmnXML diagram to display
			 */
			function openDiagram(cmmnXML) {

				// import diagram
				cmmnModeler.importXML(cmmnXML, function(err) {

					if (err) {
						return console.error('could not import CMMN 2.0 diagram', err);
					}

					// access modeler components
					var canvas = cmmnModeler.get('canvas');
					var overlays = cmmnModeler.get('overlays');


					// zoom to fit full viewport
					canvas.zoom('fit-viewport', true); // and center

					// attach an overlay to a node
					overlays.add('PI_6f0ede2a-df0c-4360-90e0-91952ebfa143', 'note', {
						position: {
							top: -5,
							right: -5
						},
						html: '<div class="diagram-note">Is this really repeatable?</div>'
					});

					// add marker
					canvas.addMarker('PI_6f0ede2a-df0c-4360-90e0-91952ebfa143', 'needs-discussion');
				});
			}

			// load external diagram file via AJAX and open it
			$.get(diagramUrl, openDiagram, 'text');

			// wire save button
			$('#save-button').click(exportDiagram);
			$('#undo-button').click(function(){
				var editorActions = cmmnModeler.get('editorActions');
				editorActions.trigger('undo');
			});
			$('#redo-button').click(function(){
				var editorActions = cmmnModeler.get('editorActions');
				editorActions.trigger('redo');
			});
		</script>
	</body>
</html>
