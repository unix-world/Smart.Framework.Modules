### START
item:
    version: 'Vacation v.20200325.1515'
    id: SAMPLE-02 # SKU
    type: s # s = Service | p = Product
    name: 'Sample: Vacation'
    currency: US$
    price: 250.00
    tax: 17.5 # Sales Tax %, 0..99.99
    pak:
        um: nights # unit of measure
        umtype: int # U.M. Type: dec = decimal ; int = integer
        umerg: 2 # U.M. Fractio: Ergonomic Order Qty.
        ummin: 4 # Minimum Order Qty.
    attributes:
        start-date:
            name: 'Start Date'
            type: date # date, datetime, time
            minval: 'date:now'
            maxval: 'date:+1 year'
            validation: 'regex:/^([0-9]{4}-[0-9]{2}-[0-9]{2}){1}$/'
            validhint: 'The Start Date between'
        adults:
            name: 'Adults'
            type: free
            min: 1
            max: 3
            validation: integer+
            validhint: 'The number of Adult Persons (18+)'
        childs:
            name: 'Childrens'
            type: free
            min: 0
            max: 3
            validation: integer+
            validhint: 'The number of childrens (0-17)'
        child-ages:
            name: 'Children Ages'
            type: free
            optional: validation
            validation: 'regex:/^((([1][0-7]){1}|([0-9]){1})[;]?){[[[@childs]]]}$/'
            validhint: 'The children ages (Ex: 8 OR 2;15 OR 5;7;17)'
    image:
        source: 'data:image/jpeg;base64,'
        width: 160
        height: 160
###END